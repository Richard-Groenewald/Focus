[build]
  # Stamp the deployed index.html with branch + commit so prod/test/dev are
  # distinguishable in-app (placeholders fall back to 'local' when unset).
  # Also emit version.txt (the FOCUS vX.Y.Z from index.html) so running clients
  # can poll for a newer deploy and prompt a refresh (see checkAppVersion()).
  command = "sed -i \"s|__BUILD_BRANCH__|${BRANCH:-local}|g; s|__BUILD_COMMIT__|${COMMIT_REF:-local}|g\" index.html && grep -m1 -oE 'FOCUS v[0-9.]+' index.html | sed 's/FOCUS v//' > version.txt"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "netlify/functions/sb.js,server.js"

# Serve the PWA manifest with its proper MIME type (Netlify defaults .webmanifest
# to application/octet-stream, which some browsers reject for install).
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
