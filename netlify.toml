[build]
  # Stamp the deployed index.html with branch + commit so prod/test/dev are
  # distinguishable in-app (placeholders fall back to 'local' when unset).
  command = "sed -i \"s|__BUILD_BRANCH__|${BRANCH:-local}|g; s|__BUILD_COMMIT__|${COMMIT_REF:-local}|g\" index.html"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "netlify/functions/sb.js,server.js"
